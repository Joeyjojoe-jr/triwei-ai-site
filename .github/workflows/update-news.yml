name: Update AI news

# Refreshes _data/news.json from live feeds so the site tracks current
# AI trends and hot topics. Runs every 6 hours and on demand.
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test news pipeline
        run: npm run check:news

      - name: Test orbit navigation
        run: npm run check:orbit

      - name: Fetch news and rebuild data
        run: |
          python scripts/fetch_news.py
          python scripts/build_industry_data.py

      - name: Validate generated site data
        run: |
          npm run check:data
          npm run check:industry

      - name: Commit updated data
        id: commit
        run: |
          git config user.name  "triwei-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add _data/news.json _data/industry.json _data/topic_history.json
          if git diff --cached --quiet; then
            echo "No news changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh AI news data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build GitHub Pages site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
