name: Validate site

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test news pipeline
        run: npm run check:news

      - name: Test orbit navigation
        run: npm run check:orbit

      - name: Test evidence-first homepage
        run: npm run check:evidence-home

      - name: Test site-wide publication contract
        run: npm run check:publication

      - name: Test palette toggle
        run: npm run check:palette

      - name: Test mobile hardening
        run: npm run check:mobile

      - name: Test Industry Atlas
        run: npm run check:industry

      - name: Test Signal History and AI Hardware
        run: npm run check:intelligence

      - name: Validate generated news data
        run: npm run check:data

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Audit rendered publication boundaries
        run: python scripts/audit_rendered_publication.py _site

      - name: Upload reviewable site preview
        uses: actions/upload-artifact@v4
        with:
          name: triwei-evidence-home-preview
          path: ./_site
          retention-days: 7
