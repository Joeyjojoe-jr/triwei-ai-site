title: TriWei AI
description: A self-updating tracker for AI news, trends, and hot topics — every story read through an ethics lens.
url: "https://triwei.ai"
baseurl: ""
timezone: America/Chicago
logo: /assets/images/logo.png

markdown: kramdown
kramdown:
  input: GFM
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page

exclude:
  - node_modules
  - scripts
  - public
  - "site (2)"
  - triwei_scaffold
  - egg
  - .github
  - .project
  - .vscode
  - package.json
  - Gemfile
  - README.md
  - CONTRIBUTING.md
  - DEVELOPER_GUIDE.md
  - SITE_STRUCTURE.md
