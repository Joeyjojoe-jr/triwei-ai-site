<head>
  <!-- Edit this file to control global metadata, SEO tags, and shared assets. -->
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">

  <link rel="icon" type="image/png" sizes="512x512" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#33ff33">

  <!-- Apply saved palette and select a safe holodeck mode before styles paint. -->
  <script>
    (function () {
      var palette = 'phosphor';
      var useStaticHolodeck = false;

      try {
        var saved = localStorage.getItem('triwei-palette');
        if (saved === 'phosphor' || saved === 'amber') {
          palette = saved;
        }
      } catch (error) {
        palette = 'phosphor';
      }

      try {
        var nav = window.navigator || {};
        var connection = nav.connection || nav.mozConnection || nav.webkitConnection;
        useStaticHolodeck = Boolean(
          (window.matchMedia && (
            window.matchMedia('(prefers-reduced-motion: reduce)').matches ||
            window.matchMedia('(max-width: 900px)').matches ||
            window.matchMedia('(pointer: coarse)').matches ||
            window.matchMedia('(hover: none)').matches
          )) ||
          (connection && connection.saveData === true) ||
          (typeof nav.deviceMemory === 'number' && nav.deviceMemory <= 4)
        );
      } catch (error) {
        useStaticHolodeck = true;
      }

      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-palette', palette);
      document.documentElement.setAttribute('data-holodeck', useStaticHolodeck ? 'static' : 'pending');

      var themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) {
        themeColorMeta.setAttribute('content', palette === 'amber' ? '#ff8800' : '#33ff33');
      }
    })();
  </script>

  <!-- GitHub Pages-safe SEO plugin. -->
  {% seo %}

  <!-- Performance hints for shared assets. -->
  <link rel="preload" href="{{ '/assets/fonts/ibm-plex-sans.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/press-start-2p.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/css/style.css' | relative_url }}" as="style">
  <link rel="preload" href="{{ '/assets/css/palette-toggle.css' | relative_url }}" as="style">

  <!-- Global styles. Release fixes load last so their safety overrides win. -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/palette-toggle.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/mobile-hardening.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/mobile-release-fixes.css' | relative_url }}">
  {% if page.atlas or page.layout == "home" %}
  <link rel="stylesheet" href="{{ '/assets/css/industry-atlas.css' | relative_url }}">
  {% endif %}
  {% if page.intelligence %}
  <link rel="stylesheet" href="{{ '/assets/css/intelligence.css' | relative_url }}">
  {% endif %}

  {% if page.layout == "home" %}
  <!-- Give rotating folder cards slightly more desktop clearance without changing the mobile stack. -->
  <style>
    @media (min-width: 721px) {
      .orbit {
        width: min(860px, 100%);
        height: 740px;
      }

      .orbit-folder {
        --r: clamp(258px, 34vw, 278px);
      }
    }
  </style>
  {% endif %}
</head>
