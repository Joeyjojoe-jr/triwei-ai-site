<header class="site-header" role="banner">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
      <span class="brand-mark">TW</span>
      <span class="brand-text">
        <strong>{{ site.title }}</strong>
        <small>Curiosity Mall · AI learning laboratory</small>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <ul>
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="is-active" aria-current="page"{% endif %}>Atrium</a></li>
        <li><a href="{{ '/explore/' | relative_url }}"{% if page.url contains '/explore/' %} class="is-active" aria-current="page"{% endif %}>Directory</a></li>
        <li><a href="{{ '/workshop/' | relative_url }}"{% if page.url contains '/workshop/' %} class="is-active" aria-current="page"{% endif %}>Workshop</a></li>
        <li><a href="{{ '/machine-room/' | relative_url }}"{% if page.url contains '/machine-room/' %} class="is-active" aria-current="page"{% endif %}>Machine Room</a></li>
      </ul>
    </nav>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">Dark</button>
  </div>
</header>
