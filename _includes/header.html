<header class="site-header" role="banner">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
      <span class="brand-mark">TW</span>
      <span class="brand-text">
        <strong>{{ site.title }}</strong>
        <small>AI news, through an ethics lens</small>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <ul>
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="is-active" aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ '/industry/' | relative_url }}"{% if page.url contains '/industry/' %} class="is-active" aria-current="page"{% endif %}>Industry Atlas</a></li>
        <li><a href="{{ '/ethics/' | relative_url }}"{% if page.url contains '/ethics/' %} class="is-active" aria-current="page"{% endif %}>Ethics Watch</a></li>
        <li><a href="{{ '/sources/' | relative_url }}"{% if page.url contains '/sources/' %} class="is-active" aria-current="page"{% endif %}>Sources &amp; Method</a></li>
        <li><a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about/' %} class="is-active" aria-current="page"{% endif %}>About</a></li>
      </ul>
    </nav>

    <button id="palette-toggle" class="theme-toggle palette-toggle" type="button" aria-label="Switch to amber color palette" aria-pressed="false">
      <span class="palette-toggle-dot" aria-hidden="true"></span>
      <span class="palette-toggle-label" aria-hidden="true"></span>
    </button>
  </div>
</header>
