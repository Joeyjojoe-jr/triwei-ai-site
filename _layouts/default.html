<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>
    <div class="holodeck" aria-hidden="true"><div class="hd-room">
      <div class="hd-face hd-back"></div>
      <div class="hd-face hd-left"></div>
      <div class="hd-face hd-right"></div>
      <div class="hd-face hd-top"></div>
      <div class="hd-face hd-bottom"></div>
    </div></div>
    <canvas id="holodeck-canvas" aria-hidden="true" hidden></canvas>
    <a class="skip-link" href="#main-content">Skip to content</a>
    {% include header.html %}

    <main id="main-content" class="page-shell">
      <div class="container">
        {% include publication-status.html %}
        {{ content }}
      </div>
    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/palette-toggle.js' | relative_url }}" defer></script>
    <script>
      // Lightweight client-side analytics hooks (no backend transport).
      (function () {
        var storageKey = 'triwei-analytics-events';
        var maxEvents = 200;
        var events = [];

        function readEvents() {
          try {
            var raw = localStorage.getItem(storageKey);
            if (!raw) return [];
            var parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function writeEvents(nextEvents) {
          try {
            localStorage.setItem(storageKey, JSON.stringify(nextEvents.slice(-maxEvents)));
          } catch (error) {
            // Ignore storage failures and keep in-memory events only.
          }
        }

        function safeText(value) {
          return String(value || '')
            .replace(/\s+/g, ' ')
            .trim()
            .slice(0, 120);
        }

        function track(eventName, payload) {
          if (!eventName) return;
          var entry = {
            event: eventName,
            path: window.location.pathname,
            title: document.title,
            ts: new Date().toISOString(),
            payload: payload || {}
          };
          events.push(entry);
          if (events.length > maxEvents) {
            events = events.slice(-maxEvents);
          }
          writeEvents(events);
          if (window.CustomEvent) {
            window.dispatchEvent(new CustomEvent('triwei:analytics', { detail: entry }));
          }
        }

        events = readEvents();
        window.triweiAnalytics = {
          track: track,
          getEvents: function () {
            return events.slice();
          },
          clear: function () {
            events = [];
            writeEvents(events);
          }
        };

        track('page_view', { referrer: document.referrer || '' });

        document.addEventListener(
          'click',
          function (event) {
            var target = event.target;
            if (!target || !target.closest) return;

            var link = target.closest('a[href]');
            if (link) {
              var href = link.getAttribute('href') || '';
              var text = safeText(link.textContent);
              if (link.closest('.site-nav')) {
                track('nav_click', { href: href, text: text });
              } else if (link.closest('.footer-inner nav')) {
                track('footer_click', { href: href, text: text });
              }
            }

            var button = target.closest('button');
            if (!button) return;

            if (button.id === 'palette-toggle') {
              window.setTimeout(function () {
                track('palette_toggle', {
                  palette: document.documentElement.getAttribute('data-palette') || 'phosphor'
                });
              }, 0);
            }
          },
          true
        );
      })();
    </script>
    <script
      src="{{ '/assets/js/holodeck-loader.js' | relative_url }}"
      data-three-src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
      data-holodeck-src="{{ '/assets/js/holodeck.js' | relative_url }}"
      defer></script>
  </body>
</html>
